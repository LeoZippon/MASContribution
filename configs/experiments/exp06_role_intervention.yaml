id: exp06_role_intervention
stage: 6
name: Topology-preserving role swap
purpose: Determine whether contribution follows the role label or remains with the graph position.
depends_on:
- exp03_loo_attribution
- exp05_topology_intervention
research_questions:
- RQ3
- RQ4
hypotheses:
- H3
- H5
datasets:
- name: humaneval
  task_file: data/processed/tasks/humaneval_tasks.jsonl
  split: test
  max_tasks: 100
  task_selection: deterministic_first
- name: mbpp
  task_file: data/processed/tasks/mbpp_tasks.jsonl
  split: test
  max_tasks: 200
  task_selection: deterministic_first
base_architectures:
- A2_chain
- A3_dag
- A5_star
role_swaps:
- id: planner_coder_swap
  swap:
  - planner
  - coder
  controls:
  - same_topology
  - same_permissions
  - same_model
- id: coder_verifier_swap
  swap:
  - coder
  - verifier
  controls:
  - same_topology
  - same_permissions
  - same_model
- id: critic_finalizer_swap
  swap:
  - critic
  - finalizer
  controls:
  - same_topology
  - same_permissions
  - same_model
- id: debugger_tester_swap
  swap:
  - debugger
  - tester
  controls:
  - same_topology
  - same_permissions
  - same_model
- id: supervisor_finalizer_swap
  swap:
  - supervisor
  - finalizer
  controls:
  - same_topology
  - same_permissions
  - same_model
attribution:
  methods:
  - loo
  - shapley_sampled
  removal_protocol: null_agent_replacement
  permutation_samples: 64
analysis:
  effect_targets:
  - role_effect
  - position_effect
  - role_position_interaction
  tests:
  - paired_test
  - mixed_effects_regression
seeds:
- 0
- 1
- 2
outputs:
  run_dir: data/runs/interventions/role
  trace_dir: data/traces/interventions/role
  attribution_file: data/results/attribution/role_intervention_attribution.jsonl
  statistics_file: data/results/statistics/role_intervention.jsonl
benchmark_specs:
  architecture_dir: configs/benchmark_specs/architectures
  agent_dir: configs/benchmark_specs/agents
  prompt_dir: configs/benchmark_specs/prompts
  permission_file: configs/benchmark_specs/permissions/permission_sets.yaml
model:
  name: ${MODEL_NAME}
  homogeneous: true
  temperature: 0.2
  max_tokens: 2048
logging:
  save_run_records: true
  save_full_trace: true
  save_tool_calls: true
  save_intermediate_outputs: true
  save_cost: true
  save_failure_type: true
  trace_graphs:
  - design_graph
  - trace_graph
  - dependency_graph
evaluation:
  primary_utility: task
  secondary_utilities:
  - net
  - process
  code_task_metric: pass_at_1
  non_code_task_metric: official_score
  bootstrap_confidence_interval: true
