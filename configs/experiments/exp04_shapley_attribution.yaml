id: exp04_shapley_banzhaf_attribution
stage: 4
name: Shapley and Banzhaf attribution on tractable subsets
purpose: Compare LOO with fair coalition-based attribution and test when LOO ranking breaks.
depends_on:
- exp01_full_system
- exp03_loo_attribution
research_questions:
- RQ2
- RQ7
hypotheses:
- H6
- H7
datasets:
- name: humaneval
  task_file: data/processed/tasks/humaneval_tasks.jsonl
  split: test
  max_tasks: 50
  task_selection: stratified_by_difficulty
- name: mbpp
  task_file: data/processed/tasks/mbpp_tasks.jsonl
  split: test
  max_tasks: 100
  task_selection: stratified_by_difficulty
architectures:
  include:
  - A1_pev
  - A2_chain
  - A3_dag
  - A5_star
  - A6_debate
  exact_shapley_max_agents: 6
  sampled_shapley_min_agents: 7
attribution:
  methods:
  - shapley_exact
  - shapley_sampled
  - banzhaf_sampled
  utility: task
  removal_protocol: null_agent_replacement
  permutation_samples:
  - 32
  - 64
  - 128
  coalition_cache: true
analysis:
  compare_with: exp03_loo_attribution
  rank_metrics:
  - spearman
  - kendall_tau
  - top1_match
  - top2_overlap
seeds:
- 0
- 1
- 2
outputs:
  run_dir: data/runs/shapley
  trace_dir: data/traces/shapley
  attribution_file: data/results/attribution/shapley_banzhaf_attribution.jsonl
  comparison_file: data/results/statistics/loo_shapley_consistency.jsonl
benchmark_specs:
  architecture_dir: configs/benchmark_specs/architectures
  agent_dir: configs/benchmark_specs/agents
  prompt_dir: configs/benchmark_specs/prompts
  permission_file: configs/benchmark_specs/permissions/permission_sets.yaml
model:
  name: ${MODEL_NAME}
  homogeneous: true
  temperature: 0.2
  max_tokens: 2048
logging:
  save_run_records: true
  save_full_trace: true
  save_tool_calls: true
  save_intermediate_outputs: true
  save_cost: true
  save_failure_type: true
  trace_graphs:
  - design_graph
  - trace_graph
  - dependency_graph
evaluation:
  primary_utility: task
  secondary_utilities:
  - net
  - process
  code_task_metric: pass_at_1
  non_code_task_metric: official_score
  bootstrap_confidence_interval: true
